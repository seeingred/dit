<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" role="img" aria-labelledby="dit-logo-title dit-logo-desc">
  <title id="dit-logo-title">DIT Logo</title>
  <description id="dit-logo-desc">A clean, transparent logo for DIT (Design Version Control). The word 'DIT' is constructed with bold geometric strokes. Below it, a Git version control graph features two parallel branches (purple and blue) starting on the left and merging perfectly into a single node on the right. The vertical nodes of the graph align mathematically with the structural centers of the letters D, I, and T above them.</description>

  <!-- 
    The layout is mathematically balanced:
    Center X: 256 | Center Y: 256
    Letter centers align perfectly with graph nodes at X = 140, 256, 372.
  -->

  <!-- Typography: "DIT" -->
  <g id="dit-text" fill="none" stroke="#0F172A" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
    <!-- 'D' Center of bounding box is at X=140 -->
    <path d="M 100,140 L 140,140 A 40,40 0 0 1 180,180 A 40,40 0 0 1 140,220 L 100,220 Z" />
    
    <!-- 'I' Center is at X=256 -->
    <path d="M 256,140 L 256,220" />
    
    <!-- 'T' Center is at X=372 -->
    <path d="M 332,140 L 412,140" />
    <path d="M 372,140 L 372,220" />
  </g>

  <!-- Graph: Branch Lines -->
  <g id="dit-graph-lines" fill="none" stroke-width="16" stroke-linecap="round">
    <!-- Top Branch (Feature / Design Variation) -->
    <!-- Starts at 140, crosses 256, smooth S-curve merge to 372 -->
    <path d="M 140,290 L 256,290 C 314,290 314,330 372,330" stroke="#8B5CF6" />
    
    <!-- Bottom Branch (Main / Source of Truth) -->
    <!-- Starts at 140, crosses 256, smooth S-curve merge to 372 -->
    <path d="M 140,370 L 256,370 C 314,370 314,330 372,330" stroke="#0EA5E9" />
  </g>

  <!-- Graph: Commit Nodes -->
  <g id="dit-graph-nodes">
    <!-- Top Branch Nodes -->
    <circle cx="140" cy="290" r="20" fill="#8B5CF6" />
    <circle cx="256" cy="290" r="20" fill="#8B5CF6" />
    
    <!-- Bottom Branch Nodes -->
    <circle cx="140" cy="370" r="20" fill="#0EA5E9" />
    <circle cx="256" cy="370" r="20" fill="#0EA5E9" />
    
    <!-- Merged Node (Final State) -->
    <!-- Aligned exactly under the stem of the 'T' -->
    <circle cx="372" cy="330" r="20" fill="#0EA5E9" />
  </g>

</svg>